---
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: go-testing
  annotations:
    pipelinesascode.tekton.dev/max-keep-runs: "2"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/on-event: "pull_request"
    pipelinesascode.tekton.dev/on-target-branch: "[*]"
    pipelinesascode.tekton.dev/on-path-change: "[***/*.go, go.mod, go.sum, vendor/**, Makefile, .tekton/go.yaml]"
spec:
  params:
    - name: repo_url
      value: "{{repo_url}}"
    - name: revision
      value: "{{revision}}"
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
    tasks:
      - name: go
        taskSpec:
          workspaces:
            - name: source
          steps:
            - name: fetch-repo
              displayName: "Fetch Repository"
              ref:
                resolver: hub
                params:
                  - name: catalog
                    value: git-clone-stepaction
                  - name: type
                    value: artifact
                  - name: kind
                    value: stepaction
                  - name: name
                    value: git-clone
                  - name: version
                    value: "1.7.0"
              params:
                - name: output-path
                  value: $(workspaces.source.path)
                - name: url
                  value: "$(params.repo_url)"
                - name: revision
                  value: "$(params.revision)"
            - name: unittest
              displayName: "Run Unit Tests"
              image: docker.io/golang:1.26
              env:
                - name: GOCACHE
                  value: $(workspaces.source.path)/go-build-cache/cache
                - name: GOMODCACHE
                  value: $(workspaces.source.path)/go-build-cache/mod
              workingDir: $(workspaces.source.path)
              script: |
                #!/usr/bin/env bash
                set -euxo pipefail
                make test
            - name: lint-go
              displayName: "Lint Go"
              image: docker.io/golangci/golangci-lint:v2.12.2
              workingDir: $(workspaces.source.path)
              script: |
                #!/usr/bin/env bash
                set -eux
                make lint-go
            - name: lint-fmt
              displayName: "Check Go formatting"
              image: docker.io/golang:1.26
              workingDir: $(workspaces.source.path)
              script: |
                #!/usr/bin/env bash
                set -euxo pipefail
                go install mvdan.cc/gofumpt@latest
                make lint-fmt
    workspaces:
      - name: source
  workspaces:
    - name: source
      emptyDir: {}
